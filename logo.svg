<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 104" role="img" aria-label="The Journal of Applied Personal Econometrics">
  <!-- Emblème : deux anneaux entrelacés (deux agents dans la même matrice) -->
  <g fill="none" stroke="#6E1F23" stroke-width="1.6">
    <circle cx="106" cy="26" r="16"/>
    <circle cx="134" cy="26" r="16"/>
    <!-- tissage : on redessine l'arc supérieur de l'anneau gauche par-dessus le droit -->
    <path d="M 116.3 13.7 A 16 16 0 0 1 121.8 23.2"/>
  </g>
  <!-- Sigle -->
  <text x="120" y="64" text-anchor="middle"
        font-family="'EB Garamond', Georgia, serif"
        font-size="26" letter-spacing="6" fill="#1A1A1A">JAPE</text>
  <!-- Nom complet en petites capitales -->
  <text x="120" y="86" text-anchor="middle"
        font-family="'EB Garamond', Georgia, serif"
        font-size="8" letter-spacing="1.4" fill="#4A4640"
        style="font-variant: small-caps;">The Journal of Applied Personal Econometrics</text>
</svg>
